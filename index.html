<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>中国博物馆旅行地图</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; overflow: hidden; background: #1a1a2e; }

#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

/* 顶部标题栏 */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 1000;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex; align-items: center; padding: 0 20px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.header h1 {
  font-size: 20px; color: #e8d5b7; letter-spacing: 3px; font-weight: 500;
  background: linear-gradient(90deg, #e8d5b7, #f5c842, #e8d5b7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 16px; }
.header .author {
  font-size: 12px; color: rgba(245,200,66,0.6); margin-left: 12px;
  font-style: italic; letter-spacing: 1px;
}
.header .stats {
  margin-left: auto; display: flex; gap: 20px; font-size: 13px; color: rgba(255,255,255,0.7);
}
.header .stats span { color: #f5c842; font-weight: 600; font-size: 16px; }

/* 左侧面板 */
.sidebar {
  position: fixed; top: 56px; left: 0; width: 320px; bottom: 0; z-index: 999;
  background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px);
  overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.08);
  transition: transform 0.3s ease;
}
.sidebar.collapsed { transform: translateX(-320px); }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

.sidebar-toggle {
  position: fixed; top: 66px; left: 320px; z-index: 1000;
  width: 28px; height: 48px; background: rgba(22, 33, 62, 0.95);
  border: 1px solid rgba(255,255,255,0.1); border-left: none;
  border-radius: 0 6px 6px 0; cursor: pointer; color: rgba(255,255,255,0.6);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: all 0.3s ease;
}
.sidebar.collapsed + .sidebar-toggle { left: 0; }

/* 筛选区域 */
.filter-section { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.filter-title { font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

.level-filter { display: flex; gap: 8px; margin-bottom: 12px; }
.level-btn {
  flex: 1; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; background: transparent; color: rgba(255,255,255,0.6);
  font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s;
}
.level-btn.active { background: rgba(245, 200, 66, 0.15); border-color: #f5c842; color: #f5c842; }
.level-btn:hover { border-color: rgba(255,255,255,0.3); }
.level-btn .count { display: block; font-size: 18px; font-weight: 700; margin-bottom: 2px; }

/* 区域列表 */
.region-list { padding: 8px; }
.region-item {
  margin-bottom: 4px; border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.04);
}
.region-header {
  display: flex; align-items: center; padding: 12px 14px; cursor: pointer;
  transition: background 0.2s; gap: 10px;
}
.region-header:hover { background: rgba(255,255,255,0.04); }
.region-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.region-name { font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 500; }
.region-count { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.4); }
.region-arrow { color: rgba(255,255,255,0.3); font-size: 12px; transition: transform 0.2s; }
.region-item.expanded .region-arrow { transform: rotate(90deg); }

.province-list { display: none; padding: 0 8px 8px; }
.region-item.expanded .province-list { display: block; }
.province-item {
  padding: 8px 12px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: rgba(255,255,255,0.6); transition: all 0.15s;
}
.province-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
.province-item.active { background: rgba(245, 200, 66, 0.1); color: #f5c842; }
.province-count { font-size: 11px; opacity: 0.6; }

/* 城市层 */
.city-list { display: none; padding: 2px 0 4px 6px; }
.province-item.expanded .city-list { display: block; }
.province-item.expanded > .province-item-row { color: rgba(255,255,255,0.9); }
.province-item-row {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; gap: 4px;
}
.province-arrow { font-size: 10px; color: rgba(255,255,255,0.3); transition: transform 0.2s; flex-shrink: 0; }
.province-item.expanded .province-arrow { transform: rotate(90deg); }

.city-group { margin-bottom: 1px; }
.city-header {
  padding: 5px 8px 5px 10px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.45); transition: all 0.15s;
}
.city-header:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
.city-header.active { background: rgba(245,200,66,0.08); color: rgba(245,200,66,0.9); }
.city-name-text { display: flex; align-items: center; gap: 6px; overflow: hidden; }
.city-dot-nav {
  width: 6px; height: 6px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.3); flex-shrink: 0;
  transition: border-color 0.15s;
}
.city-header:hover .city-dot-nav { border-color: rgba(255,255,255,0.6); }
.city-header.active .city-dot-nav { border-color: #f5c842; background: rgba(245,200,66,0.3); }
.city-name-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.city-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.city-museum-count {
  font-size: 10px; color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 8px;
}
.city-arrow { font-size: 9px; color: rgba(255,255,255,0.2); transition: transform 0.2s; }
.city-group.expanded .city-arrow { transform: rotate(90deg); }
.city-group.expanded .city-header { color: rgba(255,255,255,0.85); }

/* 博物馆条目 */
.museum-nav-list {
  display: none; margin: 2px 0 4px 10px;
  border-left: 1.5px solid rgba(255,255,255,0.08);
  padding-left: 0;
}
.city-group.expanded .museum-nav-list { display: block; }
.museum-nav-item {
  padding: 5px 8px 5px 12px; border-radius: 0 6px 6px 0; cursor: pointer;
  font-size: 12px; color: rgba(255,255,255,0.5); transition: all 0.15s;
  display: flex; align-items: center; gap: 7px;
  white-space: nowrap; overflow: hidden;
  position: relative;
}
.museum-nav-item::before {
  content: ''; position: absolute; left: 0; top: 50%;
  width: 8px; height: 1.5px;
  background: rgba(255,255,255,0.1); transform: translateY(-50%);
  transition: background 0.15s;
}
.museum-nav-item:hover::before { background: rgba(245,200,66,0.4); }
.museum-nav-item.active::before, .museum-nav-item.nav-visited::before { background: rgba(245,200,66,0.5); }
.museum-nav-item:hover { background: rgba(245,200,66,0.08); color: rgba(245,200,66,0.9); }
.museum-nav-item.active { background: rgba(245,200,66,0.12); color: #f5c842; font-weight: 500; }
.museum-nav-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.25); flex-shrink: 0; transition: all 0.15s; }
.museum-nav-item:hover .museum-nav-dot { background: #f5c842; transform: scale(1.3); }
.museum-nav-item.active .museum-nav-dot { background: #f5c842; }
.museum-nav-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.museum-nav-item .nav-visited-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #43c96a;
  flex-shrink: 0; display: none; box-shadow: 0 0 4px rgba(67,201,106,0.6);
}
.museum-nav-item.nav-visited .nav-visited-dot { display: block; }
.museum-nav-item.nav-visited { color: rgba(67,201,106,0.75) !important; }
.museum-nav-item.nav-visited .museum-nav-dot { background: #43c96a; }

/* 搜索框 */
.search-box {
  padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.search-input {
  width: 100%; padding: 10px 14px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.8); font-size: 13px; outline: none;
  transition: border-color 0.2s; box-sizing: border-box;
}
.search-input::placeholder { color: rgba(255,255,255,0.3); }
.search-input:focus { border-color: rgba(245, 200, 66, 0.4); }

/* 搜索下拉列表 */
.search-dropdown {
  position: absolute; left: 16px; right: 16px; top: calc(100% - 4px);
  background: #1e2235; border: 1px solid rgba(245,200,66,0.25);
  border-radius: 0 0 10px 10px; max-height: 320px; overflow-y: auto;
  z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}
.search-dropdown.visible { display: block; }
.dropdown-item {
  padding: 9px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s; display: flex; align-items: center; gap: 8px;
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover, .dropdown-item.active { background: rgba(245,200,66,0.12); }
.dropdown-item-name { font-size: 13px; color: rgba(255,255,255,0.9); font-weight: 500; flex: 1; min-width: 0; }
.dropdown-item-name em { color: #f5c842; font-style: normal; }
.dropdown-item-sub { font-size: 11px; color: rgba(255,255,255,0.4); white-space: nowrap; }
.dropdown-item-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  white-space: nowrap; flex-shrink: 0; align-self: flex-start; margin-top: 2px;
}
.dropdown-item-badge.badge-l1 { background: rgba(245,200,66,0.2); color: #f5c842; }
.dropdown-item-badge.badge-l2 { background: rgba(93,173,226,0.2); color: #5dade2; }
.dropdown-item-treasure {
  font-size: 11px; color: rgba(245,200,66,0.7); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dropdown-item-treasure em { color: #f5c842; font-style: normal; }
.dropdown-empty {
  padding: 14px; text-align: center; font-size: 13px; color: rgba(255,255,255,0.3);
}
.dropdown-section-title {
  padding: 6px 14px 4px; font-size: 11px; color: rgba(255,255,255,0.3);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* 博物馆详情弹窗 */
.museum-popup { max-width: 360px; }
.popup-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.popup-level {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
}
.popup-level.l1 { background: #f5c842; color: #1a1a2e; }
.popup-level.l2 { background: #5dade2; color: #fff; }
.popup-name { font-size: 16px; font-weight: 600; color: #1a1a2e; line-height: 1.3; }
.popup-address { font-size: 12px; color: #888; margin-bottom: 8px; }
.popup-desc { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 12px; }
.popup-treasures { border-top: 1px solid #eee; padding-top: 10px; }
.popup-treasures h4 { font-size: 13px; color: #b8860b; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }

/* 点亮按钮 */
.popup-visit-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px 0; margin-top: 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.2s; letter-spacing: 0.3px;
}
.popup-visit-btn.unvisited {
  background: rgba(245,200,66,0.12); color: #b8860b;
  border: 1.5px dashed rgba(245,200,66,0.4);
}
.popup-visit-btn.unvisited:hover { background: rgba(245,200,66,0.22); border-style: solid; }
.popup-visit-btn.visited {
  background: linear-gradient(135deg,#43c96a,#2ea84e);
  color: #fff; border: 1.5px solid #2ea84e;
  box-shadow: 0 2px 8px rgba(46,168,78,0.3);
}
.popup-visit-btn.visited:hover { background: linear-gradient(135deg,#3ab55e,#268c42); }

/* 已点亮地图标记 */
.museum-pin.visited-pin svg path { filter: none; }

/* 统计栏点亮数 */
.stat-visited-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(46,168,78,0.15); color: #43c96a;
  padding: 2px 8px; border-radius: 12px; font-size: 12px;
}

/* 点亮筛选按钮 */
.visited-filter-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 500; border: 1.5px solid rgba(67,201,106,0.25);
  background: rgba(67,201,106,0.07); color: rgba(67,201,106,0.8);
  transition: all 0.2s; margin-top: 8px; width: 100%; box-sizing: border-box;
}
.visited-filter-btn:hover { background: rgba(67,201,106,0.15); border-color: rgba(67,201,106,0.5); }
.visited-filter-btn.active { background: rgba(67,201,106,0.2); border-color: #43c96a; color: #43c96a; }
.visited-filter-btn .vf-count {
  margin-left: auto; background: rgba(67,201,106,0.2); color: #43c96a;
  padding: 1px 6px; border-radius: 10px; font-size: 11px;
}

/* 文物卡片 */
.treasure-item { margin-bottom: 10px; padding: 10px; background: #fdf6e3; border-radius: 8px; border-left: 3px solid #f5c842; }
.treasure-img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: opacity 0.2s; background: #f0e6d0; }
.treasure-img:hover { opacity: 0.9; }
.treasure-img-placeholder { width: 100%; height: 60px; background: linear-gradient(135deg, #f5f0e0, #ede4d0); border-radius: 6px; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; color: #c4a96a; font-size: 11px; }
.treasure-name { font-size: 13px; font-weight: 600; color: #8b6914; }
.treasure-era { font-size: 11px; color: #b8860b; margin-left: 6px; }
.treasure-desc { font-size: 12px; color: #666; line-height: 1.5; margin-top: 4px; }
.img-fullscreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 10000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.img-fullscreen img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px; }
.img-fullscreen .close-hint { position: absolute; top: 20px; right: 20px; color: rgba(255,255,255,0.6); font-size: 14px; }

/* 地图标记样式 */
.museum-pin {
  position: relative; cursor: pointer;
  transition: transform 0.2s cubic-bezier(.4,2,.6,1), filter 0.2s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
}
.museum-pin:hover { transform: scale(1.4) translateY(-2px); filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4)); z-index: 9999 !important; }
.museum-pin svg { display: block; }
/* 二级博物馆标记 */
.museum-dot-wrap {
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}
.museum-dot-wrap:hover { transform: scale(1.6); filter: drop-shadow(0 2px 5px rgba(0,0,0,0.4)); z-index: 9999 !important; }
.museum-dot-wrap svg { display: block; }
/* 一级博物馆光晕 */
.museum-pin::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 22px; height: 22px; border-radius: 50%;
  transform: translate(-50%, -55%);
  background: radial-gradient(circle, rgba(232,165,23,0.3) 0%, transparent 70%);
  animation: pulse-glow 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes pulse-glow {
  0%, 100% { transform: translate(-50%,-55%) scale(1); opacity: 0.5; }
  50% { transform: translate(-50%,-55%) scale(1.4); opacity: 0; }
}

/* Leaflet 弹窗覆盖 */
.leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.leaflet-popup-content { margin: 14px 16px; max-height: 400px; overflow-y: auto; }
.leaflet-popup-content::-webkit-scrollbar { width: 4px; }
.leaflet-popup-content::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* 城市标签 */
.city-label {
  background: none !important; border: none !important; box-shadow: none !important;
  font-size: 11px; color: rgba(80, 80, 80, 0.85); font-weight: 500;
  white-space: nowrap; pointer-events: none; text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;
  letter-spacing: 0.5px;
}
.city-label.provincial-capital {
  font-size: 13px; font-weight: 700; color: rgba(40, 40, 40, 0.9);
  text-shadow: 0 0 4px #fff, 0 0 4px #fff, 0 0 4px #fff, 0 0 4px #fff;
}
.city-dot {
  width: 5px; height: 5px; border-radius: 50%; background: rgba(80,80,80,0.5);
  border: 1px solid rgba(255,255,255,0.8); position: absolute;
}
.city-dot.capital { width: 7px; height: 7px; background: rgba(40,40,40,0.7); }
/* 省名标签 */
.province-label {
  background: none !important; border: none !important; box-shadow: none !important;
  font-size: 13px; color: rgba(100, 80, 60, 0.35); font-weight: 700;
  white-space: nowrap; pointer-events: none; letter-spacing: 4px;
}

/* 图例 */
.legend {
  position: fixed; bottom: 20px; right: 20px; z-index: 1000;
  background: rgba(22, 33, 62, 0.92); backdrop-filter: blur(10px);
  padding: 14px 18px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}
.legend-title { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 8px; letter-spacing: 1px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.legend-dot { border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); }
.legend-dot.l1 { width: 14px; height: 14px; }
.legend-dot.l2 { width: 10px; height: 10px; }
.legend-label { font-size: 12px; color: rgba(255,255,255,0.7); }
.legend-author {
  margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 11px; color: rgba(245,200,66,0.5); text-align: center;
  font-style: italic; letter-spacing: 1px;
}

/* 加载动画 */
.loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;
  background: #1a1a2e; display: flex; flex-direction: column;
  align-items: center; justify-content: center; transition: opacity 0.5s;
}
.loading.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 48px; height: 48px; border: 3px solid rgba(245,200,66,0.2);
  border-top-color: #f5c842; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #e8d5b7; margin-top: 16px; font-size: 14px; letter-spacing: 2px; }

@media (max-width: 768px) {
  .sidebar { width: 280px; }
  .sidebar-toggle { left: 280px; }
  .sidebar.collapsed + .sidebar-toggle { left: 0; }
  .header .subtitle { display: none; }
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载博物馆数据...</div>
</div>

<div class="header">
  <h1>中国博物馆旅行地图</h1>
  <span class="subtitle">National Museum Travel Map of China</span>
  <span class="author">by carolsq</span>
  <div class="stats">
    <div>一级 <span id="stat-l1">0</span></div>
    <div>二级 <span id="stat-l2">0</span></div>
    <div>共 <span id="stat-total">0</span> 家</div>
    <div class="stat-visited-badge">✓ 已点亮 <span id="stat-visited">0</span> 家</div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="search-box">

// ===== 初始化地图 =====
function initMap() {
  map = L.map('map', {
    center: [35.5, 104.5],
    zoom: 5,
    minZoom: 3,
    maxZoom: 18,
    zoomControl: false
  });
  window._map = map;

  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  // 高德地图底图（国内访问快速稳定）
  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    attribution: '&copy; 高德地图',
    maxZoom: 18,
    subdomains: '1234'
  }).addTo(map);

  // 加载省界GeoJSON

  // 加载城市标签
  loadCityLabels();
}

// ===== 省界线 =====
async function loadProvinceBorders() {
  try {
    const resp = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
    const geojson = await resp.json();
    provinceBorderLayer = L.geoJSON(geojson, {
      style: {
        color: 'rgba(120, 100, 80, 0.35)',
        weight: 1.5,
        fillColor: 'transparent',
        fillOpacity: 0,
        dashArray: '4 3'
      },
      onEachFeature: function(feature, layer) {
        // 省名标签
        if (feature.properties && feature.properties.name) {
          const center = layer.getBounds().getCenter();
          const label = L.marker(center, {
            icon: L.divIcon({
              className: 'province-label',
              html: feature.properties.name,
              iconSize: [120, 20],
              iconAnchor: [60, 10]
            }),
            interactive: false
          });
          if (!provinceLabelLayer) provinceLabelLayer = L.layerGroup();
          provinceLabelLayer.addLayer(label);
        }
      }
    }).addTo(map);
    if (provinceLabelLayer) provinceLabelLayer.addTo(map);

    // 根据缩放级别控制省名显隐和二级博物馆显示
    map.on('zoomend', () => { updateLabelVisibility(); renderMarkers(); });
    updateLabelVisibility();
  } catch (e) {
    console.warn('省界数据加载失败:', e);
  }
}

function updateLabelVisibility() {
  const zoom = map.getZoom();
  if (provinceLabelLayer) {
    if (zoom >= 4 && zoom <= 7) {
      if (!map.hasLayer(provinceLabelLayer)) map.addLayer(provinceLabelLayer);
    } else {
      if (map.hasLayer(provinceLabelLayer)) map.removeLayer(provinceLabelLayer);
    }
  }
  if (cityLabelLayer) {
    if (zoom >= 7) {
      if (!map.hasLayer(cityLabelLayer)) map.addLayer(cityLabelLayer);
    } else {
      if (map.hasLayer(cityLabelLayer)) map.removeLayer(cityLabelLayer);
    }
  }
}

// ===== 加载数据 =====
async function loadData() {
  const promises = [];
  for (const region of REGIONS) {
    promises.push(
      fetch('data/' + region.l1File).then(r => r.json()).then(d => ({ region: region.name, color: region.color, data: d })).catch(e => { console.warn('加载失败:', region.l1File, e); return null; })
    );
  }
  const results = await Promise.all(promises);

  for (const result of results) {
    if (!result || !result.data || !result.data.provinces) continue;
    const { region, color, data } = result;
    for (const province of data.provinces) {
      for (const city of (province.cities || [])) {
        for (const museum of (city.museums || [])) {
          allMuseums.push({
            ...museum,
            region, province: province.name, city: city.name, color
          });
        }
      }
    }
  }
  console.log('数据加载完成，共', allMuseums.length, '家博物馆');
}

// ===== 创建标记 =====
// ===== 点亮功能 =====
const VISITED_KEY = 'museum_visited_v1';
let visitedSet = new Set(JSON.parse(localStorage.getItem(VISITED_KEY) || '[]'));
let showOnlyVisited = false;

function isVisited(name) { return visitedSet.has(name); }

function toggleVisit(name) {
  if (visitedSet.has(name)) {
    visitedSet.delete(name);
  } else {
    visitedSet.add(name);
  }
  localStorage.setItem(VISITED_KEY, JSON.stringify([...visitedSet]));
  // 重绘标记、统计、导航点亮状态
  renderMarkers();
  updateNavVisited();
  updateVisitedCount();
}

function toggleVisitedFilter() {
  showOnlyVisited = !showOnlyVisited;
  document.getElementById('visitedFilterBtn').classList.toggle('active', showOnlyVisited);
  renderMarkers();
}

function updateVisitedCount() {
  const n = visitedSet.size;
  document.getElementById('stat-visited').textContent = n;
  document.getElementById('btn-visited').textContent = n;
}

// 更新导航树中的点亮标记
function updateNavVisited() {
  document.querySelectorAll('.museum-nav-item').forEach(el => {
    const enc = el.dataset.museum;
    if (!enc) return;
    const name = decodeURIComponent(enc);
    el.classList.toggle('nav-visited', visitedSet.has(name));
  });
}

function createMarker(m) {
  const visited = isVisited(m.name);
  const isL1 = m.level === 1;
  const gid = 'g' + Math.random().toString(36).slice(2,8);

  let html, iconSize, iconAnchor, popupAnchor;

  if (isL1) {
    // 一级博物馆：博物馆建筑小图标 16x18
    const w = 16, h = 18;
    const fill = visited ? '#27ae60' : '#e8a517';
    const stroke = visited ? '#1e8449' : '#b8860b';
    // 简洁的博物馆建筑：三角屋顶 + 柱子
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 16 18">
      <polygon points="8,1 1,7 15,7" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>
      <rect x="2" y="7" width="12" height="9" rx="0.5" fill="${fill}" stroke="${stroke}" stroke-width="0.8"/>
      <rect x="4" y="9" width="2" height="5" rx="0.3" fill="#fff" opacity="0.85"/>
      <rect x="7" y="9" width="2" height="5" rx="0.3" fill="#fff" opacity="0.85"/>
      <rect x="10" y="9" width="2" height="5" rx="0.3" fill="#fff" opacity="0.85"/>
      <line x1="2" y1="16" x2="14" y2="16" stroke="${stroke}" stroke-width="1"/>
      ${visited ? '<path d="M5.5 4.5l1 1 2.5-2.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' : ''}
    </svg>`;
    html = `<div class="museum-pin">${svg}</div>`;
    iconSize = [w, h];
    iconAnchor = [w/2, h];
    popupAnchor = [0, -h + 2];
  } else {
    // 二级博物馆：小菱形 8x8
    const s = 8;
    const fill = visited ? 'rgba(39,174,96,0.85)' : 'rgba(180,130,60,0.6)';
    const stroke = visited ? '#1e8449' : 'rgba(150,110,40,0.8)';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 8 8">
      <rect x="1.17" y="1.17" width="5.66" height="5.66" rx="1" transform="rotate(45 4 4)"
        fill="${fill}" stroke="${stroke}" stroke-width="0.6"/>
    </svg>`;
    html = `<div class="museum-dot-wrap">${svg}</div>`;
    iconSize = [s, s];
    iconAnchor = [s/2, s/2];
    popupAnchor = [0, -s/2];
  }

  const icon = L.divIcon({
    className: '',
    html: html,
    iconSize: iconSize,
    iconAnchor: iconAnchor,
    popupAnchor: popupAnchor
  });

  const marker = L.marker([m.lat, m.lng], { icon, zIndexOffset: isL1 ? 100 : 0 }).on('click', () => showMuseumPopup(m, marker));
  marker._museumData = m;
  return marker;
}

function adjustColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const nr = Math.round(r + (255-r) * (1-factor)), ng = Math.round(g + (255-g) * (1-factor)), nb = Math.round(b + (255-b) * (1-factor));
  return `rgb(${nr},${ng},${nb})`;
}

// ===== 弹窗内容 =====
function showMuseumPopup(m, marker) {
  let treasuresHtml = '';
  if (m.treasures && m.treasures.length > 0) {
    treasuresHtml = `<div class="popup-treasures"><h4>🏆 镇馆之宝（${m.treasures.length}件）</h4>`;
    for (const t of m.treasures) {
      let imgHtml = '';
      if (t.imageUrl) {
        imgHtml = `<img class="treasure-img" src="${t.imageUrl}" alt="${t.name}" loading="lazy" referrerpolicy="no-referrer" onclick="showFullImage(this.src, '${t.name.replace(/'/g, "\\'")}');" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling&&this.nextElementSibling.classList.contains('treasure-img-placeholder')&&(this.nextElementSibling.style.display='flex');">
        <div class="treasure-img-placeholder" style="display:none">📷 暂无图片</div>`;
      }
      treasuresHtml += `<div class="treasure-item">${imgHtml}<span class="treasure-name">${t.name}</span><span class="treasure-era">[ ${t.era} ]</span><div class="treasure-desc">${t.description}</div></div>`;
    }
    treasuresHtml += `</div>`;
  }

  const visited = isVisited(m.name);
  const encodedName = encodeURIComponent(m.name);
  const visitBtn = `<button class="popup-visit-btn ${visited ? 'visited' : 'unvisited'}" id="visit-btn-${encodedName}"
    onclick="toggleVisit('${m.name.replace(/'/g,"\\'")}');updatePopupBtn('${encodedName}')">
    ${visited ? '✓ 已点亮此馆' : '☆ 标记为已去过'}
  </button>`;

  const html = `<div class="museum-popup">
    <div class="popup-header">
      <span class="popup-level ${m.level === 1 ? 'l1' : 'l2'}">${m.level === 1 ? '一级' : '二级'}</span>
      <span class="popup-name">${m.name}</span>
    </div>
    <div class="popup-address">📍 ${m.address}</div>
    <div class="popup-desc">${m.description}</div>
    ${treasuresHtml}
    ${visitBtn}
  </div>`;

  marker.bindPopup(html, { maxWidth: 380, maxHeight: 450 }).openPopup();
}

// 点击点亮按钮后更新弹窗按钮状态（不重新渲染整个弹窗）
function updatePopupBtn(encodedName) {
  const name = decodeURIComponent(encodedName);
  const btn = document.getElementById('visit-btn-' + encodedName);
  if (!btn) return;
  const visited = isVisited(name);
  btn.className = `popup-visit-btn ${visited ? 'visited' : 'unvisited'}`;
  btn.innerHTML = visited ? '✓ 已点亮此馆' : '☆ 标记为已去过';
}

// ===== 图片全屏 =====
function showFullImage(src, name) {
  const overlay = document.createElement('div');
  overlay.className = 'img-fullscreen';
  overlay.innerHTML = `<img src="${src}" alt="${name}" referrerpolicy="no-referrer"><div class="close-hint">点击任意处关闭</div>`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

// ===== 渲染标记 =====
function renderMarkers() {
  for (const m of markers) map.removeLayer(m);
  markers = [];
  window._markerMap = {};

  const filtered = allMuseums.filter(m => {
    if (currentLevel !== 'all' && m.level !== currentLevel) return false;
    if (showOnlyVisited && !isVisited(m.name)) return false;
    if (currentProvince && m.province !== currentProvince) return false;
    if (currentRegion && !currentProvince && m.region !== currentRegion) return false;
    return true;
  });

  // 模糊搜索过滤（支持拼音）
  const query = document.getElementById('searchInput').value.trim();
  let finalList = filtered;
  if (query) {
    finalList = filtered.filter(m => fuzzyMatch(m, query).match);
  }

  // 已点亮的标记放在上层（zIndex更高）
  // 低缩放级别且未选"全部"/"二级"时隐藏二级博物馆
  const zoom = map.getZoom();
  const showL2 = currentLevel === 'all' || currentLevel === 2 || zoom >= 7;
  const displayList = showL2 ? finalList : finalList.filter(m => m.level === 1);

  const unvisited = displayList.filter(m => !isVisited(m.name));
  const visited = displayList.filter(m => isVisited(m.name));
  for (const m of [...unvisited, ...visited]) {
    const marker = createMarker(m);
    marker.addTo(map);
    markers.push(marker);
    window._markerMap[m.name] = marker;
  }

  updateStats(finalList);
}

// ===== 更新统计 =====
function updateStats(list) {
  const src = list || allMuseums;
  document.getElementById('stat-l1').textContent = src.filter(m => m.level === 1).length;
  document.getElementById('stat-l2').textContent = src.filter(m => m.level === 2).length;
  document.getElementById('stat-total').textContent = src.length;
  updateVisitedCount();
}


// ===== 筛选功能 =====
function filterLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.level === String(level));
  });
  buildRegionNav();
  updateNavVisited();
  renderMarkers();
}

// ===== 区域导航 =====
function buildRegionNav() {
  const container = document.getElementById('regionList');
  // 根据当前等级筛选过滤计数
  const src = currentLevel === 'all' ? allMuseums : allMuseums.filter(m => m.level === currentLevel);
  let html = '';

  // "全部"选项
  html += `<div class="region-item"><div class="region-header" onclick="selectAll()">
    <div class="region-dot" style="background:linear-gradient(135deg,#f5c842,#e74c3c)"></div>
    <span class="region-name">全部区域</span>
    <span class="region-count">${src.length}家</span>
  </div></div>`;

  for (const region of REGIONS) {
    const rMuseums = src.filter(m => m.region === region.name);
    const provinces = region.provinces;

    let provinceHtml = '';
    for (const p of provinces) {
      const pMuseums = src.filter(m => m.province === p);
      if (pMuseums.length === 0) continue;

      // 按城市分组
      const cityMap = {};
      for (const m of pMuseums) {
        if (!cityMap[m.city]) cityMap[m.city] = [];
        cityMap[m.city].push(m);
      }

      let cityHtml = '';
      const cityEntries = Object.entries(cityMap);
      const singleCity = cityEntries.length === 1;

      for (const [cityName, cityMuseums] of cityEntries) {
        const museumsHtml = cityMuseums.map(m =>
          `<div class="museum-nav-item${isVisited(m.name) ? ' nav-visited' : ''}" data-museum="${encodeURIComponent(m.name)}" onclick="focusMuseum('${encodeURIComponent(m.name)}',event)" title="${m.name}">
            <div class="museum-nav-dot"></div>
            <span class="museum-nav-name">${m.name}</span>
            <div class="nav-visited-dot"></div>
          </div>`
        ).join('');

        if (singleCity) {
          cityHtml += `<div class="museum-nav-list" style="display:block;border-left:none;margin-left:0;padding-left:4px">${museumsHtml}</div>`;
        } else {
          cityHtml += `<div class="city-group" id="city-${encodeURIComponent(p)}-${encodeURIComponent(cityName)}">
          <div class="city-header" onclick="toggleCity(this.parentElement,'${p}','${region.name}',event)">
            <div class="city-name-text">
              <div class="city-dot-nav"></div>
              <span class="city-name-label">${cityName}</span>
            </div>
            <div class="city-meta">
              <span class="city-museum-count">${cityMuseums.length}家</span>
              <span class="city-arrow">▶</span>
            </div>
          </div>
          <div class="museum-nav-list">${museumsHtml}</div>
        </div>`;
        }
      }

      provinceHtml += `<div class="province-item" data-province="${p}" id="prov-${encodeURIComponent(p)}">
        <div class="province-item-row" onclick="toggleProvince(this.parentElement,'${p}','${region.name}')">
          <span>${p}</span>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="province-count">${pMuseums.length}家</span>
            <span class="province-arrow">▶</span>
          </div>
        </div>
        <div class="city-list">${cityHtml}</div>
      </div>`;
    }

    if (rMuseums.length === 0) continue;

    html += `<div class="region-item" data-region="${region.name}">
      <div class="region-header" onclick="toggleRegion(this.parentElement)">
        <div class="region-dot" style="background:${region.color}"></div>
        <span class="region-name">${region.name}</span>
        <span class="region-count">${rMuseums.length}家</span>
        <span class="region-arrow">▶</span>
      </div>
      <div class="province-list">${provinceHtml}</div>
    </div>`;
  }

  container.innerHTML = html;
}

function toggleRegion(el) {
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.region-item').forEach(i => i.classList.remove('expanded'));
  if (!wasExpanded) {
    el.classList.add('expanded');
    const regionName = el.dataset.region;
    if (regionName) {
      currentRegion = regionName;
      currentProvince = null;
      renderMarkers();
      const rMuseums = allMuseums.filter(m => m.region === regionName);
      if (rMuseums.length) {
        const bounds = L.latLngBounds(rMuseums.map(m => [m.lat, m.lng]));
        map.flyToBounds(bounds, { padding: [60, 60], maxZoom: 8 });
      }
    }
  } else {
    currentRegion = null; currentProvince = null;
    renderMarkers();
  }
}

function toggleProvince(el, province, region) {
  const wasExpanded = el.classList.contains('expanded');
  // 收起同级所有省
  el.closest('.province-list').querySelectorAll('.province-item').forEach(i => i.classList.remove('expanded', 'active'));
  if (!wasExpanded) {
    el.classList.add('expanded', 'active');
    currentProvince = province;
    currentRegion = region;
    renderMarkers();
    const pMuseums = allMuseums.filter(m => m.province === province);
    if (pMuseums.length) {
      const bounds = L.latLngBounds(pMuseums.map(m => [m.lat, m.lng]));
      map.flyToBounds(bounds, { padding: [60, 60], maxZoom: 10 });
    }
  } else {
    currentProvince = null;
    renderMarkers();
  }
}

function toggleCity(el, province, region, e) {
  e.stopPropagation();
  const wasExpanded = el.classList.contains('expanded');
  // 收起同省下其他城市
  el.closest('.city-list').querySelectorAll('.city-group').forEach(i => i.classList.remove('expanded'));
  el.closest('.city-list').querySelectorAll('.city-header').forEach(i => i.classList.remove('active'));
  if (!wasExpanded) {
    el.classList.add('expanded');
    el.querySelector('.city-header').classList.add('active');
  }
}

function focusMuseum(encodedName, e) {
  e.stopPropagation();
  const name = decodeURIComponent(encodedName);
  const m = allMuseums.find(x => x.name === name);
  if (!m) return;

  // 高亮选中
  document.querySelectorAll('.museum-nav-item').forEach(i => i.classList.remove('active'));
  e.currentTarget.classList.add('active');

  // 飞到该馆并打开弹窗
  map.flyTo([m.lat, m.lng], 14, { animate: true, duration: 0.8 });
  setTimeout(() => {
    if (window._markerMap && window._markerMap[m.name]) {
      window._markerMap[m.name].openPopup();
    }
  }, 900);
}

function selectProvince(province, region) {
  currentProvince = province;
  currentRegion = region;
  document.querySelectorAll('.province-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`.province-item[data-province="${province}"]`)?.classList.add('active');
  renderMarkers();
  const pMuseums = allMuseums.filter(m => m.province === province);
  if (pMuseums.length) {
    const bounds = L.latLngBounds(pMuseums.map(m => [m.lat, m.lng]));
    map.flyToBounds(bounds, { padding: [60, 60], maxZoom: 10 });
  }
}

function selectAll() {
  currentRegion = null;
  currentProvince = null;
  document.querySelectorAll('.province-item').forEach(i => i.classList.remove('active', 'expanded'));
  document.querySelectorAll('.region-item').forEach(i => i.classList.remove('expanded'));
  document.querySelectorAll('.city-group').forEach(i => i.classList.remove('expanded'));
  document.querySelectorAll('.museum-nav-item').forEach(i => i.classList.remove('active'));
  renderMarkers();
  map.flyTo([35.5, 104.5], 5);
}

// ===== 侧边栏 =====
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
  document.getElementById('sidebarToggle').textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
}

// 获取汉字拼音首字母串
function getPinyinInitials(str) {
  return (str||'').split('').map(c => PINYIN_MAP[c] || c).join('');
}

// 高亮匹配文本
function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<em>${m}</em>`);
}

// 模糊匹配：支持子串、拼音首字母、分词、镇馆之宝
function fuzzyMatch(museum, query) {
  const q = query.toLowerCase().trim();
  if (!q) return { match: true, score: 0, matchedTreasure: null };

  const baseFields = [museum.name, museum.province, museum.city, museum.address || '', museum.description || ''];
  const baseText = baseFields.join(' ').toLowerCase();
  const pinyinText = getPinyinInitials(baseFields.slice(0, 4).join('')).toLowerCase();

  // 检查镇馆之宝匹配
  let matchedTreasure = null;
  const treasures = museum.treasures || [];
  for (const t of treasures) {
    const tName = t.name.toLowerCase();
    const tAll = (t.name + ' ' + (t.era || '') + ' ' + (t.description || '')).toLowerCase();
    const tPinyin = getPinyinInitials(t.name).toLowerCase();
    if (tName.includes(q) || tAll.includes(q) || tPinyin.includes(q)) {
      matchedTreasure = t.name;
      break;
    }
  }

  const treasureText = treasures.map(t => t.name + ' ' + (t.era || '') + ' ' + (t.description || '')).join(' ').toLowerCase();
  const allText = baseText + ' ' + treasureText;

  const keywords = q.split(/\s+/).filter(Boolean);
  let score = 0;
  for (const kw of keywords) {
    if (allText.includes(kw)) {
      if (museum.name.toLowerCase().includes(kw)) score += 10;
      else if (matchedTreasure && matchedTreasure.toLowerCase().includes(kw)) score += 8;
      else score += 3;
    } else if (pinyinText.includes(kw)) {
      score += 1;
    } else {
      return { match: false, score: 0, matchedTreasure: null };
    }
  }
  return { match: true, score, matchedTreasure };
}

// ===== 搜索下拉列表 =====
let dropdownActiveIndex = -1;
let dropdownItems = [];

function showDropdown(query) {
  const dropdown = document.getElementById('searchDropdown');
  if (!query.trim()) {
    dropdown.classList.remove('visible');
    dropdownItems = [];
    return;
  }

  const results = [];
  for (const m of allMuseums) {
    const { match, score, matchedTreasure } = fuzzyMatch(m, query);
    if (match && score > 0) results.push({ museum: m, score, matchedTreasure });
  }
  results.sort((a, b) => b.score - a.score);

  dropdownItems = results.slice(0, 12);
  dropdownActiveIndex = -1;

  if (dropdownItems.length === 0) {
    dropdown.innerHTML = `<div class="dropdown-empty">未找到相关博物馆或文物</div>`;
  } else {
    const q = query.toLowerCase().trim();
    dropdown.innerHTML = dropdownItems.map((r, i) => {
      const m = r.museum;
      const highlightedName = highlight(m.name, q);
      const levelBadge = m.level === 1 ? '一级' : '二级';
      const levelCls = m.level === 1 ? 'badge-l1' : 'badge-l2';
      const treasureHint = r.matchedTreasure
        ? `<div class="dropdown-item-treasure">🏆 ${highlight(r.matchedTreasure, q)}</div>`
        : '';
      return `<div class="dropdown-item" data-index="${i}" onmousedown="selectDropdownItem(${i})">
        <div style="flex:1;min-width:0">
          <div class="dropdown-item-name">${highlightedName}</div>
          <div class="dropdown-item-sub">${m.province} · ${m.city}</div>
          ${treasureHint}
        </div>
        <div class="dropdown-item-badge ${levelCls}">${levelBadge}</div>
      </div>`;
    }).join('');
  }
  dropdown.classList.add('visible');
}

function selectDropdownItem(index) {
  const item = dropdownItems[index];
  if (!item) return;
  const m = item.museum;
  document.getElementById('searchInput').value = m.name;
  document.getElementById('searchDropdown').classList.remove('visible');
  // 定位到该博物馆
  if (window._map) {
    window._map.setView([m.lat, m.lng], 12);
  }
  // 打开弹窗
  if (window._markerMap && window._markerMap[m.name]) {
    window._markerMap[m.name].openPopup();
  }
  renderMarkers();
}

function hideDropdown() {
  setTimeout(() => {
    document.getElementById('searchDropdown').classList.remove('visible');
  }, 150);
}

// ===== 搜索 =====
let searchTimer;
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('searchInput');
  input.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = input.value.trim();
    searchTimer = setTimeout(() => {
      showDropdown(q);
      renderMarkers();
    }, 200);
  });
  input.addEventListener('keydown', (e) => {
    const dropdown = document.getElementById('searchDropdown');
    const items = dropdown.querySelectorAll('.dropdown-item');
    if (!dropdown.classList.contains('visible')) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      dropdownActiveIndex = Math.min(dropdownActiveIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('active', i === dropdownActiveIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      dropdownActiveIndex = Math.max(dropdownActiveIndex - 1, -1);
      items.forEach((el, i) => el.classList.toggle('active', i === dropdownActiveIndex));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (dropdownActiveIndex >= 0) {
        selectDropdownItem(dropdownActiveIndex);
      } else {
        dropdown.classList.remove('visible');
        renderMarkers();
      }
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('visible');
    }
  });
  input.addEventListener('blur', hideDropdown);
});

// ===== 启动 =====
async function init() {
  try {
    initMap();
    await loadData();

    // 更新按钮计数
    document.getElementById('btn-all').textContent = allMuseums.length;
    document.getElementById('btn-l1').textContent = allMuseums.filter(m => m.level === 1).length;
    document.getElementById('btn-l2').textContent = allMuseums.filter(m => m.level === 2).length;

    buildRegionNav();
    updateNavVisited();
    updateVisitedCount();
    renderMarkers();
  } catch (e) {
    console.error('初始化失败:', e);
  }
  // 无论成功失败都关闭加载动画
  document.getElementById('loading').classList.add('hidden');
}

// 10秒超时保底：无论如何都关闭loading
setTimeout(() => {
  const el = document.getElementById('loading');
  if (el && !el.classList.contains('hidden')) {
    el.classList.add('hidden');
    console.warn('加载超时，强制关闭loading');
  }
}, 10000);

init();
</script>
